# OTIV Backend Configuration
# 이 파일을 수정하고 docker compose restart backend 로 반영한다.
# 실제 적용 파일은 /data/config.yaml 이며, 초기 실행 시 자동 생성된다.

# 접속 비밀번호 — 프론트엔드 진입 시 입력을 요구한다.
access_password: "changeme"

# 관리자 비밀번호 — 로고를 1000ms 안에 5번 클릭 시 입력 팝업이 표시된다.
# 관리자 모드에서는 인스턴스 생성, kick, ban, 시간제한/접속 수 설정이 가능하다.
admin_password: "adminchangeme"

# 리스닝 포트 (숫자 또는 ":8080" 형식 모두 허용)
port: "8080"

# PKI 및 인스턴스 데이터 저장 경로
data_dir: /data

# 호스트에서 본 data_dir 경로
# docker-compose 환경에서는 HOST_DATA_DIR 환경변수로 자동 주입된다.
host_data_dir: /data

# OpenVPN 컨테이너 전용 internal 네트워크 (호스트 접근 차단)
vpn_network: otiv_vpn_net

# OpenVPN Docker 이미지 이름
ovpn_image: otiv-openvpn

# 프론트엔드 개발 서버 URL (백엔드가 리버스 프록시)
frontend_url: http://frontend:5173

# VPN 접속 시간제한 (초 단위, 0 이하는 무제한)
# 관리자 모드에서 클라이언트별로 개별 설정 가능 (0 이하이면 이 전역값을 따름)
connection_timeout: 0

# 인스턴스당 최대 동시 접속 클라이언트 수 (0 이하는 무제한)
# 관리자 모드에서 인스턴스별로 개별 설정 가능 (0 이하이면 이 전역값을 따름)
# WebSocket 업그레이드 전에 검사하므로 초과 시 즉시 503 반환
max_clients_per_instance: 0

# HTTPS 설정
# data_dir/tls/ 폴더에 cert.pem, key.pem 을 넣으면 자동으로 HTTPS 로 동작한다.
# 인증서가 없거나 유효하지 않으면 자동으로 HTTP 로 폴백하며 로그를 남긴다.
# 별도 경로를 사용하려면 아래 주석을 해제한다.
# tls:
#   cert: /data/tls/cert.pem
#   key: /data/tls/key.pem
